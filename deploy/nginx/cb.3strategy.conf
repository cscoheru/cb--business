# CB Business Frontend - cb.3strategy.cc
# Vercel Proxy Configuration

server {
    listen 80;
    listen [::]:80;
    server_name cb.3strategy.cc;

    # Redirect all HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cb.3strategy.cc;

    # SSL Configuration (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/cb.3strategy.cc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cb.3strategy.cc/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/cb.3strategy.cc/chain.pem;

    # Modern SSL Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Logging
    access_log /var/log/nginx/cb.3strategy.cc.access.log;
    error_log /var/log/nginx/cb.3strategy.cc.error.log;

    # Proxy to Vercel
    location / {
        proxy_pass https://vercel-cb-business.vercel.app;
        proxy_http_version 1.1;

        # Proxy Headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering
        proxy_buffering off;
        proxy_cache_bypass $http_upgrade;
    }

    # Health check endpoint (optional)
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # robots.txt
    location = /robots.txt {
        return 200 "User-agent: *\nAllow: /\nSitemap: https://cb.3strategy.cc/sitemap.xml\n";
        add_header Content-Type text/plain;
    }

    # favicon.ico fallback
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }
}
