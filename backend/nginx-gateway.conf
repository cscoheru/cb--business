# ZenConsult API - Nginx Gateway Configuration
# 文件位置: /etc/nginx/conf.d/zenconsult.conf (在 nginx-gateway 容器内)

# HTTP - 重定向到 HTTPS
server {
    listen 80;
    server_name api.zenconsult.top;

    # Let's Encrypt ACME 挑战
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS - API 代理
server {
    listen 443 ssl http2;
    server_name api.zenconsult.top;

    # SSL 证书
    ssl_certificate /etc/nginx/ssl/api.zenconsult.top.crt;
    ssl_certificate_key /etc/nginx/ssl/api.zenconsult.top.key;

    # SSL 配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 安全头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # 客户端请求大小限制
    client_max_body_size 10M;

    # API 代理到 FastAPI 容器
    location / {
        # cb-business-api 是我们的 FastAPI 容器名称
        proxy_pass http://cb-business-api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # WebSocket 支持
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # 缓冲设置
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }

    # 健康检查（无日志）
    location /health {
        proxy_pass http://cb-business-api:8000/health;
        access_log off;
    }
}
