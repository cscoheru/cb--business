# CB Business Admin Panel - admin.zenconsult.top
# Vercel Proxy Configuration

server {
    listen 80;
    listen [::]:80;
    server_name admin.zenconsult.top;

    # Redirect all HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.zenconsult.top;

    # SSL Configuration (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/admin.zenconsult.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.zenconsult.top/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/admin.zenconsult.top/chain.pem;

    # Modern SSL Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security Headers (stricter for admin)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline';" always;

    # Logging
    access_log /var/log/nginx/admin.zenconsult.top.access.log;
    error_log /var/log/nginx/admin.zenconsult.top.error.log;

    # Rate limiting for admin login
    limit_req_zone $binary_remote_addr zone=admin_limit:10m rate=10r/s;
    limit_req zone=admin_limit burst=20 nodelay;

    # Proxy to Vercel
    location / {
        proxy_pass https://vercel-cb-admin.vercel.app;
        proxy_http_version 1.1;

        # Proxy Headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering
        proxy_buffering off;
        proxy_cache_bypass $http_upgrade;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Block common admin attack paths
    location ~ ^/+(wp-admin|admin|phpmyadmin|sqlmanager|mysqld) {
        deny all;
        return 404;
    }
}
