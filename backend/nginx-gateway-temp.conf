# ZenConsult API - Nginx Gateway Configuration
# 临时版本 - 等待 FastAPI 部署

# HTTP - 重定向到 HTTPS
server {
    listen 80;
    server_name api.zenconsult.top;

    # Let's Encrypt ACME 挑战
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS - 临时响应（等待 FastAPI 部署）
server {
    listen 443 ssl;
    server_name api.zenconsult.top;

    # SSL 证书
    ssl_certificate /etc/nginx/ssl/api.zenconsult.top.crt;
    ssl_certificate_key /etc/nginx/ssl/api.zenconsult.top.key;

    # SSL 配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # 安全头
    add_header Strict-Transport-Security "max-age=31536000" always;

    # 临时响应 - 服务正在部署中
    location / {
        return 503;
        add_header Retry-After "300";
        default_type application/json;
    }
}
