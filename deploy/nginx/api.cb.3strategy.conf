# CB Business Backend API - api.cb.3strategy.cc
# Railway Proxy Configuration

# Rate limiting for API endpoints
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=api_auth_limit:10m rate=10r/s;

upstream railway_backend {
    # Railway deployment URL (update after deployment)
    server cb-business-backend-production.up.railway.app;

    # Health check
    keepalive 32;
    keepalive_timeout 120s;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.cb.3strategy.cc;

    # Redirect all HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.cb.3strategy.cc;

    # SSL Configuration (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/api.cb.3strategy.cc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.cb.3strategy.cc/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/api.cb.3strategy.cc/chain.pem;

    # Modern SSL Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # CORS for API
    add_header Access-Control-Allow-Origin "https://cb.3strategy.cc https://admin.cb.3strategy.cc" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
    add_header Access-Control-Max-Age "3600" always;

    # Logging
    access_log /var/log/nginx/api.cb.3strategy.cc.access.log;
    error_log /var/log/nginx/api.cb.3strategy.cc.error.log;

    # Client body size limit for file uploads
    client_max_body_size 10M;
    client_body_buffer_size 128k;

    # Timeouts for long-running API requests
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    # CORS preflight
    if ($request_method = OPTIONS) {
        return 204;
    }

    # API health check (no rate limiting)
    location /health {
        proxy_pass https://railway_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # Auth endpoints (stricter rate limiting)
    location ~ ^/api/v1/(auth|login|register) {
        limit_req zone=api_auth_limit burst=20 nodelay;

        proxy_pass https://railway_backend;
        proxy_http_version 1.1;

        # Proxy Headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Hide backend headers
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
    }

    # Payment webhooks (no rate limiting, special handling)
    location ~ ^/api/v1/payments/(wechat|alipay)/notify {
        # Allow payment provider IPs only (configure as needed)
        # allow 101.227.0.0/16;  # WeChat Pay
        # allow 110.75.0.0/16;   # WeChat Pay
        # deny all;

        proxy_pass https://railway_backend;
        proxy_http_version 1.1;

        # Proxy Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # No buffering for webhooks
        proxy_buffering off;
    }

    # All other API endpoints (standard rate limiting)
    location / {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass https://railway_backend;
        proxy_http_version 1.1;

        # Proxy Headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Hide backend headers
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;

        # Support for WebSocket (if needed)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # API Documentation (public access)
    location /docs {
        proxy_pass https://railway_backend/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # OpenAPI JSON
    location /openapi.json {
        proxy_pass https://railway_backend/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
