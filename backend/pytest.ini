[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
env_files =
env =
    DATABASE_URL=postgresql+asyncpg://test:test@localhost/test_db
    REDIS_URL=redis://localhost
    SECRET_KEY=test_secret_key
