# ZenConsult API - Nginx Gateway Configuration
# 简化版本 - 仅用于 ACME 挑战和初始配置

# HTTP - Let's Encrypt ACME 挑战
server {
    listen 80;
    server_name api.zenconsult.top;

    # Let's Encrypt ACME 挑战（优先级最高）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # 其他请求暂时返回 503（等待 FastAPI 部署）
    location / {
        return 503;
        add_header Retry-After "300";
    }
}
